name: CI
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }} / go ${{ matrix.go }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        go: ['1.23', '1.24']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true
      - name: vet
        run: go vet ./...
      - name: build
        run: go build ./...
      - name: test (race)
        run: go test -race -count=1 -timeout 180s ./...
      - name: coverage
        run: go test -coverprofile=coverage.out -covermode=atomic ./...
      - name: fuzz smoke
        run: go test -run='^$' -fuzz='^FuzzEncodeDecodeTripleKey$' -fuzztime=10s ./keys/...
      - name: bench smoke
        run: go test -bench=. -benchtime=1x -run='^$' ./bench/...
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}-go${{ matrix.go }}
          path: coverage.out
